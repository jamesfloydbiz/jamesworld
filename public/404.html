<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Tell crawlers NOT to index this URL. Without this, Google sees the
       200-OK status (GitHub Pages serves 404.html with 200 for unknown
       routes) and treats the route as a "soft 404". -->
  <meta name="robots" content="noindex, nofollow" />
  <title>404 — Page Not Found | James Floyd</title>
  <meta name="description" content="That page doesn't exist on jamesfloyds.world. Head back to the home page." />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <style>
    html, body { margin: 0; padding: 0; background: #fff; color: #1a1a1a; font-family: ui-serif, Georgia, "Times New Roman", serif; }
    .wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    h1 { font-size: 4rem; margin: 0 0 1rem; letter-spacing: 0.05em; }
    p { font-size: 1.1rem; max-width: 36rem; line-height: 1.6; color: #555; margin: 0 0 1.5rem; }
    a { color: #1a1a1a; text-decoration: underline; text-underline-offset: 4px; }
    a:hover { text-decoration: none; }
  </style>
  <!--
    GitHub Pages SPA shim: route deep URLs to the React app so real visitors
    end up at the right page. This script rewrites e.g. /sonder into
    /?/sonder, then index.html restores the path before React Router runs.

    Crawlers that don't run JS see the visible 404 content below.
    Crawlers that do run JS still respect the noindex meta tag above, so
    the route stays out of the index.

    Real users in a browser get redirected within a few ms.
  -->
  <script>
    (function(l) {
      // Don't loop-redirect if we're literally at /404 or /404.html.
      var spa = l.pathname && l.pathname !== '/404.html' && l.pathname !== '/404';
      if (spa) {
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          '/?/' + l.pathname.slice(1).replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }
    }(window.location));
  </script>
</head>
<body>
  <main class="wrap">
    <h1>404</h1>
    <p>That page doesn't exist on jamesfloyds.world.</p>
    <p><a href="/">Return to the home page</a> &nbsp;·&nbsp; <a href="/sonder">The Sonder Series</a> &nbsp;·&nbsp; <a href="/projects">Projects</a> &nbsp;·&nbsp; <a href="/portfolio">Portfolio</a></p>
  </main>
</body>
</html>
